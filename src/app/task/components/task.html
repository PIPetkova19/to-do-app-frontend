<h2>List of tasks</h2>

<ul>
  @for(task of tasks; track task.id){
  <li>

    <h3>{{ task.title }}</h3>

    <p>{{ task.description }}</p>

    <span> {{ task.dueDate }}</span>
    <span>{{ task.priority }}</span>
    <span> {{ task.status }}</span>

      <a [routerLink]="['/details', task.id]">
  See more
</a>
  </li>
}
</ul>
